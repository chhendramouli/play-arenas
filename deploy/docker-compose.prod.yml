# Production docker-compose for play-arenas, sized for AWS EC2 t3.micro (1 GB RAM).
# Memory caps total ~750 MB; the rest is headroom for the host + 2 GB swap.
#
# Services exposed publicly through Caddy:
#   /api/*       → backend
#   /actuator/*  → backend
#   /temporal-ui → temporal-ui (basic-auth protected)
#
# Postgres data persists in a named volume; Temporal state is rebuilt on restart.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-letsplay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-letsplay}
      POSTGRES_DB: ${POSTGRES_DB:-letsplay_db}
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - effective_cache_size=256MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - max_connections=100
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-letsplay} -d ${POSTGRES_DB:-letsplay_db}"]
      interval: 5s
      timeout: 5s
      retries: 12
    deploy:
      resources:
        limits:
          memory: 200M

  temporal:
    image: temporalio/auto-setup:1.25.0
    restart: unless-stopped
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-letsplay}
      POSTGRES_PWD:  ${POSTGRES_PASSWORD:-letsplay}
      POSTGRES_SEEDS: postgres
      DBNAME: temporal
      VISIBILITY_DBNAME: temporal_visibility
      LOG_LEVEL: warn
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 280M

  temporal-ui:
    image: temporalio/ui:2.31.2
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: ${PUBLIC_FRONTEND_ORIGIN:-http://localhost:3000}
      TEMPORAL_UI_ENABLE_EXPERIMENTAL: "true"
    depends_on:
      - temporal
    deploy:
      resources:
        limits:
          memory: 80M

  backend:
    image: ${BACKEND_IMAGE:-play-arenas-backend:local}
    build:
      context: ../backend
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: "-Xms192m -Xmx320m -XX:MaxRAMPercentage=70 -XX:+UseSerialGC"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-letsplay_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-letsplay}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-letsplay}
      TEMPORAL_HOST: temporal:7233
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 360M

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      TEMPORAL_UI_USER: ${TEMPORAL_UI_USER:-admin}
      TEMPORAL_UI_HASH: ${TEMPORAL_UI_HASH}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - temporal-ui
    deploy:
      resources:
        limits:
          memory: 60M

volumes:
  pgdata:
  caddy_data:
  caddy_config:
