spring.application.name=play-arenas-backend
server.port=8090

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/decathlon_play
spring.datasource.username=decathlon
spring.datasource.password=decathlon
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# CORS settings for Next.js frontend
frontend.url=http://localhost:3000

# JWT — override jwt.secret or set JWT_SECRET env var in production
# jwt.secret=your-production-secret-here

# Temporal Configuration
temporal.host=localhost:7233
booking.hold-duration-minutes=2

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
