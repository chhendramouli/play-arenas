spring.application.name=dplay-backend
server.port=8090

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/letsplay_db
spring.datasource.username=letsplay
spring.datasource.password=letsplay
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool — keep well below postgres max_connections
# so Temporal has room. Override via DB_POOL_SIZE env var in prod.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# CORS settings for Next.js frontend
frontend.url=http://localhost:3000

# JWT — override jwt.secret or set JWT_SECRET env var in production
# jwt.secret=your-production-secret-here

# Temporal Configuration
temporal.host=localhost:7233
booking.hold-duration-minutes=2

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
